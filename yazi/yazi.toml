[manager]
show_hidden = true
sort_by = "natural"
sort_dir_first = true

[preview]
max_width = 1000
max_height = 1000

[opener]
edit = [
    { run = 'nvim "$@"', block = true, desc = "Edit" }
]

[open]
rules = [
    { name = "*.txt", use = "edit" },
    { name = "*.py",  use = "edit" },
    { name = "*.sql", use = "edit" },
    { name = "*.toml", use = "edit" }
]
